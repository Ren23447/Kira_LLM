<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kira</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0f;
      --surface:  #16161a;
      --border:   #2a2a30;
      --accent:   #7c6af7;
      --accent2:  #a89af9;
      --text:     #e8e8f0;
      --muted:    #8888a0;
      --user-bg:  #1e1e28;
      --kira-bg:  #131318;
      --radius:   14px;
      --font:     'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ─────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #4f3fbf);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .header-info h1 {
      font-size: 16px; font-weight: 600; letter-spacing: -0.01em;
    }
    .header-info .subtitle {
      font-size: 12px; color: var(--muted);
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; margin-left: auto;
      transition: background 0.3s;
    }
    #status-dot.llm   { background: #4ade80; }
    #status-dot.frag  { background: #facc15; }
    #status-dot.error { background: #f87171; }
    #status-label {
      font-size: 11px; color: var(--muted); margin-left: 6px;
    }

    /* ── Chat area ──────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 8px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Messages ───────────────────────────────────── */
    .msg {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      flex-shrink: 0; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
    }
    .msg.kira .msg-avatar {
      background: linear-gradient(135deg, var(--accent), #4f3fbf);
      color: #fff;
    }
    .msg.user .msg-avatar {
      background: var(--border);
      color: var(--muted);
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      word-wrap: break-word;
    }
    .msg.kira .bubble {
      background: var(--kira-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    .mode-tag {
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
      padding-left: 2px;
    }

    /* ── Typing indicator ───────────────────────────── */
    .typing .bubble {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 18px;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
      40%            { opacity: 1;   transform: scale(1); }
    }

    /* ── Input area ─────────────────────────────────── */
    #input-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    #input-row:focus-within {
      border-color: var(--accent);
    }
    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14.5px;
      line-height: 1.5;
      resize: none;
      min-height: 22px;
      max-height: 140px;
      overflow-y: auto;
    }
    #msg-input::placeholder { color: var(--muted); }
    #msg-input::-webkit-scrollbar { width: 3px; }
    #msg-input::-webkit-scrollbar-thumb { background: var(--border); }

    #send-btn {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: var(--accent);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
    }
    #send-btn:hover  { background: var(--accent2); }
    #send-btn:active { transform: scale(0.93); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #send-btn svg { width: 16px; height: 16px; fill: #fff; }

    /* ── Footer hint ────────────────────────────────── */
    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="avatar">K</div>
    <div class="header-info">
      <h1>Kira</h1>
      <div class="subtitle">Built from scratch by Julian Riley Hunter</div>
    </div>
    <div id="status-dot"></div>
    <span id="status-label">connecting…</span>
  </header>

  <div id="chat"></div>

  <div id="input-area">
    <div id="input-row">
      <textarea
        id="msg-input"
        placeholder="Say something…"
        rows="1"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" title="Send (Enter)">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="input-hint">Enter to send · Shift+Enter for new line</p>
  </div>
</div>

<script>
  const chatEl   = document.getElementById('chat');
  const inputEl  = document.getElementById('msg-input');
  const sendBtn  = document.getElementById('send-btn');
  const statusDot   = document.getElementById('status-dot');
  const statusLabel = document.getElementById('status-label');

  let sending = false;

  // ── Status ────────────────────────────────────────────────────
  async function checkStatus() {
    try {
      const res  = await fetch('/status');
      const data = await res.json();
      const llm  = data.llm?.available;
      statusDot.className   = llm ? 'llm' : 'frag';
      statusLabel.textContent = llm
        ? `LLM · ${(data.llm.parameters / 1e6).toFixed(1)}M params`
        : 'Fragment mode';
    } catch {
      statusDot.className   = 'error';
      statusLabel.textContent = 'server offline';
    }
  }
  checkStatus();

  // ── Append message ────────────────────────────────────────────
  function appendMsg(role, text, mode = '') {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'kira' ? 'K' : 'Y';

    const right = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    right.appendChild(bubble);

    if (role === 'kira' && mode) {
      const tag = document.createElement('div');
      tag.className = 'mode-tag';
      tag.textContent = mode === 'llm' ? '⚡ neural' : '◦ fragment';
      right.appendChild(tag);
    }

    wrap.appendChild(avatar);
    wrap.appendChild(right);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg kira typing';
    wrap.innerHTML = `
      <div class="msg-avatar">K</div>
      <div class="bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return wrap;
  }

  // ── Send ──────────────────────────────────────────────────────
  async function send() {
    if (sending) return;
    const text = inputEl.value.trim();
    if (!text) return;

    sending = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMsg('user', text);
    const typingEl = showTyping();

    try {
      const res = await fetch('/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text }),
      });
      const data = await res.json();
      typingEl.remove();
      if (data.error) {
        appendMsg('kira', `[error] ${data.error}`);
      } else {
        appendMsg('kira', data.response, data.mode);
      }
    } catch (err) {
      typingEl.remove();
      appendMsg('kira', 'could not reach the server. is kira_server.py running?');
      statusDot.className = 'error';
      statusLabel.textContent = 'server offline';
    } finally {
      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── Auto-resize textarea ──────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // ── Keyboard ──────────────────────────────────────────────────
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);
  inputEl.focus();

  // ── Welcome message ───────────────────────────────────────────
  setTimeout(() => {
    appendMsg('kira', "hey. i'm Kira. what's on your mind?");
  }, 300);
</script>
</body>
</html>
